name: robot_dog_app
description: 智能机器狗配套APP - 控制中枢、互动窗口、养成陪伴

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  flutter_bluetooth_serial: ^0.4.0
  wifi_scan: ^0.4.1
  permission_handler: ^11.1.0
  shared_preferences: ^2.2.2
  flutter_joystick: ^0.2.0
  percent_indicator: ^4.2.3
  flutter_animate: ^4.3.0
  go_router: ^13.0.1
  package_info_plus: ^9.0.0
  path_provider: ^2.1.5
  http: ^1.6.0
  web_socket_channel: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
