version: '3.8'

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: lynshae_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-LynShae@2026Root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-lynshae_db}
      MYSQL_USER: ${MYSQL_USER:-lynshae_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-LynShae@2026}
      TZ: Asia/Shanghai
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
      - ./docker/mysql/conf:/etc/mysql/conf.d
    networks:
      - lynshae_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-LynShae@2026Root}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: lynshae_redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-LynShae@2026Redis} --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
      - ./docker/redis/conf:/usr/local/etc/redis
    networks:
      - lynshae_network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-LynShae@2026Redis}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Node.js API 服务
  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    container_name: lynshae_app
    restart: always
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-3000}
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE:-lynshae_db}
      MYSQL_USER: ${MYSQL_USER:-lynshae_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-LynShae@2026}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-LynShae@2026Redis}
      JWT_SECRET: ${JWT_SECRET:-lynshae-jwt-secret-key-2026-change-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-2h}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      TZ: Asia/Shanghai
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - ./uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - lynshae_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Admin Web UI (可选)
  admin:
    build:
      context: ./admin
      dockerfile: ../docker/admin/Dockerfile
    container_name: lynshae_admin
    restart: always
    environment:
      VITE_API_BASE_URL: ${ADMIN_API_URL:-http://localhost:3000/api}
    ports:
      - "${ADMIN_PORT:-8080}:80"
    depends_on:
      - app
    networks:
      - lynshae_network

  # phpMyAdmin (开发环境)
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: lynshae_phpmyadmin
    restart: always
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: ${MYSQL_ROOT_PASSWORD:-LynShae@2026Root}
      UPLOAD_LIMIT: 100M
    ports:
      - "${PMA_PORT:-8081}:80"
    depends_on:
      - mysql
    networks:
      - lynshae_network
    profiles:
      - dev

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

networks:
  lynshae_network:
    driver: bridge
